name: VirtualBook Live BSD Sync

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: virtualbook-live-bsd-sync
  cancel-in-progress: false

jobs:
  live-bsd-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - uses: actions/checkout@v4

      - name: Run live BSD sync loop
        env:
          CRON_BASE_URL: ${{ secrets.CRON_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          LIVE_SYNC_TICKS: "10"
          LIVE_SYNC_SLEEP_SECONDS: "30"
        run: bash cron/live-bsd-sync.sh