name: VirtualBook Live BSD Sync

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: virtualbook-live-bsd-sync
  cancel-in-progress: false

jobs:
  live-bsd-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run live BSD sync loop
        shell: bash
        env:
          CRON_BASE_URL: ${{ secrets.CRON_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          LIVE_BSD_INTERVAL_SECONDS: "15"
          LIVE_BSD_MAX_RUNTIME_SECONDS: "285"
          LIVE_BSD_TICK_TIMEOUT_SECONDS: "28"
        run: bash cron/live-bsd-sync.sh