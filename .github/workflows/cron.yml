name: VirtualBook Cron

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "*/10 * * * *"
    - cron: "*/15 * * * *"
    - cron: "*/20 * * * *"
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-crons:
    runs-on: ubuntu-latest

    steps:
      - name: Call pipeline cron
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/10 * * * *'
        run: |
          curl -fsS -X POST "${{ secrets.CRON_BASE_URL }}/api/cron/pipeline" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"

      - name: Call BSD full horizon odds sync
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 * * * *'
        run: |
          curl -fsS -X POST "${{ secrets.CRON_BASE_URL }}/api/odds/sync" \
            -H "content-type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --data '{"days":14,"dryRun":false,"tz":"Europe/Warsaw","stopOnError":false}'

      - name: Call results sync
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/5 * * * *'
        run: |
          curl -fsS -X POST "${{ secrets.CRON_BASE_URL }}/api/results/sync" \
            -H "content-type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --data '{"lookbackHours":12,"lookaheadHours":6,"batchLimit":80,"throttleMs":1200,"maxRetries":2}'

      - name: Call hot settle cron
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/5 * * * *'
        run: |
          curl -fsS -X POST "${{ secrets.CRON_BASE_URL }}/api/cron/settle" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"

      - name: Call match-center pre-match cron
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/15 * * * *'
        run: |
          curl -fsS "${{ secrets.CRON_BASE_URL }}/api/cron/import-match-center-batch?statuses=SCHEDULED,TIMED&onlyMissingLineups=1&limit=8&poolSize=60&preKickoffMinutes=180&postKickoffGraceMinutes=90&refreshCooldownMinutes=15" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"

      - name: Call match-center live cron
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/5 * * * *'
        run: |
          curl -fsS "${{ secrets.CRON_BASE_URL }}/api/cron/import-match-center-batch?statuses=IN_PLAY,PAUSED,LIVE&limit=12&poolSize=60&refreshCooldownMinutes=3" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"

      - name: Call match-center finalize cron
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/20 * * * *'
        run: |
          curl -fsS "${{ secrets.CRON_BASE_URL }}/api/cron/import-match-center-batch?statuses=FINISHED&onlyMissingStats=1&limit=10&poolSize=60&finishedLookbackHours=18&refreshCooldownMinutes=20" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"

      - name: Enqueue match mapping queue
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/10 * * * *'
        run: |
          curl -fsS -X POST "${{ secrets.CRON_BASE_URL }}/api/cron/enqueue-match-mapping?lookbackHours=12&lookaheadHours=96&limit=300" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"

      - name: Process match mapping queue
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/5 * * * *'
        run: |
          curl -fsS -X POST "${{ secrets.CRON_BASE_URL }}/api/cron/process-match-mapping?batchSize=12&maxAttempts=5&staleLockMinutes=10" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"