name: VirtualBook Cron

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "*/15 * * * *"
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  run-crons:
    runs-on: ubuntu-latest

    steps:
      - name: Call sync runner
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/5 * * * *'
        run: |
          curl -fsS -X POST "${{ secrets.CRON_BASE_URL }}/api/cron/sync-runner" \
            -H "content-type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --data '{"maxAheadDays":14}'

      - name: Call hot settle cron
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/5 * * * *'
        run: |
          curl -fsS -X POST "${{ secrets.CRON_BASE_URL }}/api/cron/settle" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
